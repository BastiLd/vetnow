# Baut das VetNow-Studio-Image und pusht es nach GitHub Container Registry (GHCR).
# Damit braucht die docker-compose.yml keinen komplexen Mehrzeilen-Befehl mehr
# (ZimaOS/CasaOS verstümmelt solche Befehle beim Compose-Import) — nur noch
# ein fertiges Image referenzieren.
name: Build VetNow Studio Image

on:
  push:
    branches: [main]
    paths:
      - 'studio/**'
      - '.github/workflows/studio-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: studio
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/vetnow-studio:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
