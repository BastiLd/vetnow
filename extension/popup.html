<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
  <title>VetNow Kärnten</title>
</head>
<body>
  <div class="pop">
    <header class="head">
      <span class="brand-mark">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="6" cy="9" r="2.1"/><circle cx="11" cy="6" r="2.1"/><circle cx="16.5" cy="8" r="2.1"/><path d="M11 11.5c2.6 0 4.8 1.9 4.8 4.3 0 1.8-1.5 2.7-3.2 2.7-1 0-1.1-.4-1.6-.4s-.6.4-1.6.4c-1.7 0-3.2-.9-3.2-2.7 0-2.4 2.2-4.3 4.8-4.3Z"/></svg>
      </span>
      <span class="brand-name">VetNow <span class="reg">Kärnten</span></span>
      <span class="status-mini" id="statusMini"><span class="d"></span><span id="statusMiniLabel">–</span></span>
    </header>

    <main class="body" id="view"></main>

    <nav class="nav" id="nav">
      <button data-view="status" class="is-on">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 18v-6a5 5 0 1 1 10 0v6"/><path d="M5 21h14"/><path d="M21 12h1M18.5 4.5 18 5M2 12h1M12 2v1M4.929 4.929l.707.707"/></svg>
        Status
      </button>
      <button data-view="appts">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg>
        Termine
      </button>
      <button data-view="messages">
        <span style="position:relative;display:grid;place-items:center">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
          <span class="badge" id="navBadge" style="display:none"></span>
        </span>
        Nachrichten
      </button>
    </nav>
  </div>
  <script src="data.js"></script>
  <script src="popup.js"></script>
</body>
</html>
