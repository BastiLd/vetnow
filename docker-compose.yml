# VetNow Studio — Control-Panel als eine Docker-App auf ZimaOS.
#
# Nutzt ein FERTIGES Image (ghcr.io/bastild/vetnow-studio) statt eines
# Mehrzeilen-Startbefehls — ZimaOS/CasaOS verstümmelt komplexe Compose-
# Befehle beim Import (Zeilenumbrüche gehen verloren). Das Image enthält den
# Start-Code bereits fest (studio/entrypoint.sh) und klont/aktualisiert das
# Repo bei jedem Start selbst.
#
# Danach im Browser:   http://SERVER-IP:3000
#
# WICHTIG: Unten HOST_IP auf die LAN-IP deines ZimaOS-Servers setzen
# (dieselbe wie in der Adressleiste, z. B. 192.168.68.10).
services:
  vetnow-studio:
    image: ghcr.io/bastild/vetnow-studio:latest
    container_name: vetnow-studio
    environment:
      HOST_IP: "192.168.68.10"          # <<< LAN-IP deines Servers eintragen!
      REPO_URL: "https://github.com/BastiLd/vetnow.git"
      REPO_ROOT: "/repo"
      STUDIO_DATA_DIR: "/data"
      STUDIO_PORT: "3000"
      EXPO_NO_TELEMETRY: "1"
      OLLAMA_URL: "http://192.168.68.10:11434"   # Ollama auf demselben Server (für den KI-Bot)
    ports:
      - "3000:3000"     # Studio-Oberfläche + Web-Vorschauen
      - "8081:8081"     # Expo/Metro — iPhone-App (sauber)
      - "8082:8082"     # Expo/Metro — iPhone-App (Demo + Bot)
      - "8083:8083"     # Expo/Metro — Avocado at Law (bei Konflikt anderen Port wählen,
                        #   dann AUCH in Studio → Avocado-iPhone-App → Port anpassen; innen=außen!)
    volumes:
      - /DATA/AppData/vetnow-studio/repo:/repo
      - /DATA/AppData/vetnow-studio/data:/data
    restart: unless-stopped
