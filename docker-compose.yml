# VetNow Studio — Control-Panel als eine Docker-App auf ZimaOS.
#
# Was der Container macht: klont dieses Repo (bzw. zieht bei jedem Neustart den
# neuesten Stand), installiert Studio + baut die Web-App vor + installiert die
# Mobile-Abhängigkeiten und startet dann VetNow Studio.
#
# Danach im Browser:   http://SERVER-IP:3000
#   -> Web-App bauen & previewen, Expo-Server starten (QR für iPhone),
#      Extension herunterladen, Apps gruppieren.
#
# WICHTIG: Unten HOST_IP auf die LAN-IP deines ZimaOS-Servers setzen
# (dieselbe wie in der Adressleiste, z. B. 192.168.68.10).
#
# Hinweis: ZimaOS/CasaOS wandelt benannte Volumes beim Compose-Import in
# Bind-Mounts um und braucht dafür feste Host-Pfade — deshalb werden hier
# (statt benannter Volumes) direkt Ordner unter /DATA/AppData/ verwendet,
# der Standard-Speicherort für App-Daten auf ZimaOS. Diese Ordner werden
# beim ersten Start automatisch angelegt.
services:
  vetnow-studio:
    image: node:22-bookworm
    container_name: vetnow-studio
    environment:
      HOST_IP: "192.168.68.10"          # <<< LAN-IP deines Servers eintragen!
      REPO_URL: "https://github.com/BastiLd/vetnow.git"
      REPO_ROOT: "/repo"
      STUDIO_DATA_DIR: "/data"
      STUDIO_PORT: "3000"
      EXPO_NO_TELEMETRY: "1"
    command:
      - bash
      - -lc
      - |
        set -e
        if [ ! -d /repo/.git ]; then git clone "$REPO_URL" /repo; else git -C /repo pull --ff-only || true; fi
        cd /repo/studio && npm install --omit=dev
        ( cd /repo/web && npm ci && VITE_VN_CLEAN=true npm run build ) || echo "Web-Build wird beim ersten Klick nachgeholt"
        ( cd /repo/mobile && npm ci ) || echo "Mobile-Deps werden beim ersten Expo-Start nachgeholt"
        node /repo/studio/server.js
    ports:
      - "3000:3000"     # Studio-Oberfläche
      - "8081:8081"     # Expo/Metro (für Expo Go)
    volumes:
      - /DATA/AppData/vetnow-studio/repo:/repo
      - /DATA/AppData/vetnow-studio/data:/data
    restart: unless-stopped
